<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        body{
            background-color: red;
        }
        .form{
         
           
        }
        .first{
            display:flex;
            flex-direction:column;
            width:fit-content;
        }
         .second{
            display:flex;
            gap: 20px;
          
        }
         .third{
            display:flex;
            gap:20px;
           
        }
         .fourth{
            display:flex;
           gap: 110px;
        }
         .fifth{
            gap:53px;
        }
         .sixth{
            display:flex
            flex-direction:column;
            width:fit-content;
        }
         .seventh{
            display:flex
             flex-direction:column;
            width:fit-content;
        } 
        .button{
            fit content;
        }
        </style>
</head>
<body>
    <div class="background">
    </div>
    <div class="form" style="    background-color: white;
    margin: 400px;
    padding: 50px;">
     <h1>Student Registration Form</h1>
    <form>
               <div class="first"> 
           <label>Student Name</label>
            <input type="text"id="name">
            </div><br>
            <div class="second">
                <span style="flex-direction: column;width: fit-content;display: flex;">
            <label>Mobile No</label>
            <input type="number"id="number"></span>
              <span style="flex-direction: column;width: fit-content;display: flex;">
            <label>Email Id</label>
             <input type="email"id="email"></span>
        </div><br>
        <div class="third">
            <span style=" flex-direction:column; width:fit-content;display: flex;">
            <label>Father Name</label>
            <input type="text"id="name">
            </span>
            <span style=" flex-direction:column;
            width:fit-content;display:flex;">
            <label>Mother Name</label>
            <input type="text"id="name">
            </span>
        </div><br>
        <div class="fourth">
            <span style=" flex-direction:column; width:fit-content;display: flex;">
            <label>Select Course</label>
            <select>
                <option>Select...</option>
                <option value="cse">cse</option>
                <option value="cse">ece</option>
                <option value="cse">mech</option>
                <option value="cse">civil</option>
            </select>
            </span>
        <span style=" flex-direction:column; width:fit-content;display: flex;">
         <label>Date Of Birth</label>
            <input type="date"id="date"placeholder="dd--yyyy">
            </span>
         </div><br>
         <div class="fifth" style="display: flex;">
        <span style=" flex-direction:column; gap:10px;width:fit-content;">
            <label>Gender</label>
          <br>
            <input type="radio"id="gender"value="female">
            <label>Female</label>
              <input type="radio"id="gender"value="Male">
            <label>Male</label>
              </span>
            <span style="padding:5px;flex-direction:column; width:fit-content;">
            <label>Student Photo</label>
         <br>
                <input type="file"id="file"placeholder="choose file" style="padding:8px;border: 1px solid black;" >
            </span>
            
        </div><br>
        <div class="sixth">
            <label>Select Branch</label>
            <br>
            <input type="checkbox" id="branch" value="cse">
            <label>CSE</label>
             <input type="checkbox" id="branch" value="it">
            <label>IT</label>
             <input type="checkbox" id="branch" value="ece">
            <label>ECE</label>
             <input type="checkbox" id="branch" value="civil">
            <label>CIVIL</label>
        </div><br>
        <div class="seventh">
            <label>Address</label>
            <br>
            <textarea></textarea>
        </div>
         <br>
         <div class="button">
            <button style="text-align:center;background-color:red;color: white;height:40px;width:451px;">Submit</button>
         </div>


    </form>
</div>
</body>
</html>
